<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>StoneScript Professional Editor</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Consolas', monospace; margin: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* エディタ部分 */
        textarea { 
            width: 100%; background: #000; color: #fff; 
            border: 2px solid #333; border-radius: 4px;
            padding: 10px; font-size: 16px; line-height: 1.4;
            font-family: inherit;
        }
        #editor { height: 400px; }
        #content { height: 150px; margin-bottom: 10px; display: none; }

        /* 下部のステータスエリア */
        .footer-status { 
            display: flex; gap: 20px; background: #1e1e1e; 
            padding: 15px; border-radius: 0 0 8px 8px; border: 2px solid #333; border-top: none;
        }
/* CSSの .status-box を少し調整 */
.status-box { 
    flex: 1; 
    border-right: 1px solid #333; 
    padding-right: 10px;
    max-height: 150px; /* 必要に応じて高さを調整してください */
    overflow-y: auto;  /* 中身が増えたらスクロールバーを出す */
}
        
        #color-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .color-chip { display: inline-block; width: 18px; height: 18px; border: 1px solid #fff; vertical-align: middle; }
        .color-item { font-size: 12px; display: flex; align-items: center; gap: 4px; background: #333; padding: 2px 6px; border-radius: 4px; }
        
        .github-box { margin-bottom: 20px; background: #1e1e1e; padding: 15px; border-radius: 8px; }
        select { background: #333; color: #fff; border: 1px solid #555; padding: 5px; width: 200px; }
        button { background: #444; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #666; }
        button.primary { background: #007bff; }
        
        .warning { color: #ff6b6b; font-weight: bold; }
        .ok { color: #00ff00; }
        h3 { margin-top: 0; font-size: 14px; color: #888; text-transform: uppercase; }
        #cursor-pos { font-size: 18px; color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>StoneScript Editor + GitHub</h2>

    <div class="github-box">
        <div>
            <label>File Select:</label>
            <select id="fileList"></select>
            <button class="primary" onclick="loadFile()">読み込み</button><br>
        </div>
        <div style="margin-top: 10px;">
            <span style="display: inline-block; width: 12ch;"></span>
            <button onclick="togglePreview()">Preview表示切替</button>
            <span style="display: inline-block; width: 2ch;"></span>
            <button onclick="OpenURL()">GitHubでCommit</button>
        </div>
    </div>

    <textarea id="content" placeholder="読み込まれたRawデータがここに表示されます"></textarea>
    <textarea id="editor" placeholder="// ここにStoneScriptを記述してください..."></textarea>

    <div class="footer-status">
        <!-- 🚩 新設: カーソル位置表示 -->
        <div class="status-box" style="flex: 0 0 150px;">
            <h3>📍 Cursor</h3>
            <div id="cursor-pos">行 1, 列 1</div>
        </div>
        
        <div class="status-box">
            <h3>📊 Line Status</h3>
            <div id="line-counter">✅ All lines OK</div>
        </div>
        
        <div class="status-box">
            <h3>🎨 Color Preview</h3>
            <div id="color-list"></div>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzlamueSTT7Kt_6XONUZEQUsELRoW7-HBeXziJqE8yzwm0yHJLC3rCE9TvP7g-_NEWECA/exec";
    const editor = document.getElementById('editor');
    const colorList = document.getElementById('color-list');
    const lineCounter = document.getElementById('line-counter');
    const cursorPos = document.getElementById('cursor-pos');
    const contentArea = document.getElementById('content');

    const colorMap = { "#sky": "#87CEEB", "#wood": "#8B4513" };

    // --- 新機能: カーソル位置の更新 ---
    function updateCursorInfo() {
        const text = editor.value;
        const pos = editor.selectionStart;
        const lines = text.substr(0, pos).split("\n");
        const row = lines.length;
        const col = Array.from(lines[lines.length - 1]).length + 1; // 全角考慮
        cursorPos.innerText = `行 ${row}, 列 ${col}`;
    }

    function updateColors(text) {
        const colorRegex = /#([a-fA-F0-9]{6}|[a-fA-F0-9]{3}|red|blue|cyan|yellow|green|white|black|orange|purple|wood)\b/g;
        const rawMatches = text.match(colorRegex);
        if (!rawMatches) { colorList.innerHTML = ""; return; }
        const matches = [...new Set(rawMatches)];
        colorList.innerHTML = matches.map(color => {
            let cssColor = colorMap[color] || ( /^#([a-fA-F0-9]{6}|[a-fA-F0-9]{3})$/.test(color) ? color : color.replace('#', '') );
            return `<div class="color-item"><span class="color-chip" style="background-color: ${cssColor};"></span><code>${color}</code></div>`;
        }).join('');
    }

function checkLines(text) {
    const lines = text.split('\n');
    let errors = [];
    lines.forEach((line, i) => {
        const count = Array.from(line).length;
        if (count > 40) errors.push(`L${i+1}: ${count}文字`);
    });

    if (errors.length > 0) {
        // joinを<br>にすることで、エラーごとに改行されます
        lineCounter.innerHTML = `<span class="warning">⚠️ 40列超過:<br>${errors.join('<br>')}</span>`;
    } else {
        lineCounter.innerHTML = `<span class="ok">✅ All lines OK</span>`;
    }
}

    function handleInput() {
        updateColors(editor.value);
        checkLines(editor.value);
        updateCursorInfo();
    }

    // 複数のイベントを監視してカーソル位置を逃さない
    editor.addEventListener('input', handleInput);
    editor.addEventListener('click', updateCursorInfo);
    editor.addEventListener('keyup', updateCursorInfo);

    function togglePreview() {
        contentArea.style.display = (contentArea.style.display === 'none' || contentArea.style.display === '') ? 'block' : 'none';
    }

    async function loadList() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            const select = document.getElementById("fileList");
            select.innerHTML = data.filter(f => f.type === "file").map(f => `<option value="${f.path}">${f.name}</option>`).join('');
        } catch { alert("リスト取得失敗"); }
    }


    function OpenURL() {
        const path = document.getElementById("fileList").value;
        window.open(`https://github.com/ryuubokusub1/stone_story_rpg/edit/main/${path}`, '_blank');
    }


function checkLines(text) {
    const lines = text.split('\n');
    let errors = [];
    
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const lineNum = i + 1;
        
        // --- 共通チェック (40列、全角) ---
        const charCount = Array.from(line).length;
        if (charCount > 40) errors.push(`L${lineNum}: 40列超過`);
        if (line.includes('　')) errors.push(`L${lineNum}: 全角スペースあり`);

        // --- ブロック構造のチェック ---
        // 現在の行が ? : func for のいずれかを含んでいるか
        const isBlockHeader = /[\?\:]|func\s|for\s/.test(line);
        
        if (isBlockHeader && i + 1 < lines.length) {
            const currentIndent = line.match(/^ */)[0].length;
            const nextLine = lines[i + 1];
            
            // 次の行が空行やコメントなら、さらにその次を探すべきですが
            // 簡易的に「次の有効な行」をチェックするロジック
            if (nextLine.trim().length > 0 && !nextLine.trim().startsWith('//')) {
                const nextIndent = nextLine.match(/^ */)[0].length;
                
                if (nextIndent <= currentIndent) {
                    errors.push(`L${lineNum + 1}: 字下げが不足しています`);
                }
            }
        }
    }

    if (errors.length > 0) {
        lineCounter.innerHTML = `⚠️ 構造エラー:<br>${errors.join('<br>')}`;
    } else {
        lineCounter.innerHTML = `<span class="ok">✅ All lines OK</span>`;
    }
}


    loadList();
</script>

</body>
</html>
