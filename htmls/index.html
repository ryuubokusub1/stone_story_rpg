<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StoneScript Editor</title>
    <style>
        * { box-sizing: border-box; }

        body { 
            background: #121212; color: #e0e0e0; 
            font-family: 'Consolas', 'Courier New', monospace; 
            margin: 0; padding: 10px;
            display: flex; justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 1000px;
        }
        
        .github-box { 
            margin-bottom: 15px; background: #1e1e1e; 
            padding: 12px; border-radius: 8px; 
            border: 1px solid #333;
        }
        .github-box div { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .github-box select { background: #333; color: #fff; border: 1px solid #555; padding: 8px; flex: 1; min-width: 150px; border-radius: 4px; font-size: 14px; }
        .github-box button { background: #444; color: white; border: none; padding: 10px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .github-box button.primary { background: #007bff; }

        /* レイアウト */
        .editor-main-layout {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        textarea { 
            background: #000; color: #fff; 
            border: 2px solid #333; border-radius: 4px;
            padding: 12px; font-size: 16px; line-height: 1.4;
            font-family: inherit;
            outline: none;
        }
        textarea:focus { border-color: #007bff; }
        
        /* 🚩 PC・横画面時の基本高さ */
        #editor { 
            flex: 1; 
            height: 65vh; 
            min-height: 400px;
        }

        /* Rawデータエリア */
        #content { width: 100%; height: 120px; margin-bottom: 10px; display: none; }

        /* 候補エリア */
        #suggestion-area {
            width: 220px;
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 4px;
            overflow-y: auto;
        }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #2a2a2a; }
        .suggestion-item:hover { background: #333; }
        .sugg-label { color: #00ff00; font-weight: bold; font-size: 13px; display: block; }
        .sugg-desc { color: #888; font-size: 10px; line-height: 1.2; display: block; margin-top: 2px; }

        /* ステータスバー */
        .status { 
            display: flex; flex-wrap: wrap; gap: 10px; background: #1e1e1e; 
            padding: 12px; border-radius: 0 0 8px 8px; border: 2px solid #333; border-top: none;
        }
        .status-box { flex: 1; min-width: 130px; border-right: 1px solid #333; padding-right: 8px; }
        .status-box:last-child { border-right: none; }
        h3 { margin: 0 0 4px 0; font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        #cursor-pos { font-size: 16px; color: #00ff00; font-weight: bold; }
        #color-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
        .color-item { font-size: 10px; display: flex; align-items: center; gap: 4px; background: #2a2a2a; padding: 2px 5px; border-radius: 3px; }
        .color-chip { width: 12px; height: 12px; border: 1px solid #fff; }
        .warning { color: #ff6b6b; font-size: 12px; font-weight: bold; display: block; }
        .ok { color: #00ff00; font-size: 12px; }

        /* 📱 スマホ縦画面：エディタを最優先 */
        @media (max-width: 600px) and (orientation: portrait) {
            .editor-main-layout { flex-direction: column; gap: 5px; }
            
            #editor { 
                width: 100%; 
                height: 60vh; /* 🚩 Raw枠より圧倒的に広く確保 */
                min-height: 350px; 
            }
            
            #suggestion-area { 
                width: 100%; 
                height: 90px; /* 🚩 候補はスリム化して邪魔しないように */
            }
            
            .github-box div { flex-direction: column; align-items: stretch; }
            .status-box { border-right: none; border-bottom: 1px solid #222; padding-bottom: 8px; width: 100%; }
        }

        /* 📱 スマホ横画面：左右並びで高さを節約 */
        @media (max-height: 500px) and (orientation: landscape) {
            #editor { height: 50vh; min-height: 150px; }
            #suggestion-area { width: 180px; height: auto; }
            h2 { font-size: 16px; margin: 5px 0; }
            .github-box { padding: 8px; margin-bottom: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top: 0; font-size: 1.2rem;">StoneScript Editor</h2>

    <div class="github-box">
        <div>
            <select id="fileList"></select>
            <button class="primary" onclick="loadFile()">読み込み</button>
            <button onclick="togglePreview()">表示切替</button>
            <button onclick="OpenURL()">GitHub</button>
        </div>
    </div>

    <!-- Rawデータ保存用（非表示可） -->
    <textarea id="content" placeholder="ここにRawデータが読み込まれます"></textarea>

    <div class="status">
        <div class="status-box" style="flex: 0 0 120px;">
            <h3>📍 Cursor</h3>
            <div id="cursor-pos">行 1, 列 1</div>
        </div>
        <div class="status-box">
            <h3>📊 Status</h3>
            <div id="line-counter"><span class="ok">✅ OK</span></div>
        </div>
        <div class="status-box">
            <h3>🎨 Colors</h3>
            <div id="color-list"></div>
        </div>
    </div>

    <div class="editor-main-layout">
        <div id="suggestion-area">
            <div style="padding: 10px; font-size: 11px; color: #666; text-align: center;">入力候補</div>
        </div>

        <textarea id="editor" placeholder="// ここに入力してください..." spellcheck="false"></textarea>
    </div>
</div>

    function updateCursorInfo() {
        const text = editor.value;
        const pos = editor.selectionStart;
        const lines = text.substr(0, pos).split("\n");
        const row = lines.length;
        const col = Array.from(lines[row - 1]).length + 1;
        cursorPos.innerText = `行 ${row}, 列 ${col}`;
    }

    function showSuggestions() {
        const pos = editor.selectionStart;
        const textBefore = editor.value.substring(0, pos);
        const lastWord = textBefore.split(/[\s\n\?\:\=\>\<\!\(\)\[\]]+/).pop();

        if (lastWord.length < 1) {
            suggestionArea.innerHTML = '<div style="padding: 10px; font-size: 11px; color: #666; text-align: center;">入力候補</div>';
            return;
        }

        const matches = dictionary.filter(item => item.term.startsWith(lastWord));
        if (matches.length > 0) {
            suggestionArea.innerHTML = "";
            matches.forEach(item => {
                const div = document.createElement('div');
                div.className = "suggestion-item";
                div.innerHTML = `<span class="sugg-label">${item.label}</span><span class="sugg-desc">${item.description}</span>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    insertWord(item.insert, lastWord);
                };
                suggestionArea.appendChild(div);
            });
        } else {
            suggestionArea.innerHTML = '<div style="padding: 10px; font-size: 11px; color: #666; text-align: center;">なし</div>';
        }
    }

    function insertWord(word, lastWord) {
        const pos = editor.selectionStart;
        const start = pos - lastWord.length;
        const text = editor.value;

        // 1. $1 の位置を探します
        const placeholderIndex = word.indexOf("$1");
        let targetCursorPos = start + word.length; // デフォルトは挿入文字列の末尾

        let finalWord = word;
        if (placeholderIndex !== -1) {
            // 2. $1 を除去した、実際に挿入する文字列を作ります
            finalWord = word.replace("$1", "");
            // 3. 移動先のカーソル位置を計算します
            targetCursorPos = start + placeholderIndex;
        }

        // 4. エディタのテキストを置き換えます
        editor.value = text.substring(0, start) + finalWord + text.substring(pos);
        
        // 5. 計算した位置にカーソルを移動させます
        editor.selectionStart = editor.selectionEnd = targetCursorPos;
        editor.focus();
        handleInput();
    }


    function updateColors(text) {
        const colorRegex = /#([a-fA-F0-9]{6}|[a-fA-F0-9]{3}|red|blue|cyan|yellow|green|white|black|orange|purple|wood)\b/g;
        const rawMatches = text.match(colorRegex);
        if (!rawMatches) { colorList.innerHTML = ""; return; }
        const matches = [...new Set(rawMatches)];
        colorList.innerHTML = matches.map(color => {
            let cssColor = colorMap[color] || ( /^#([a-fA-F0-9]{6}|[a-fA-F0-9]{3})$/.test(color) ? color : color.replace('#', '') );
            return `<div class="color-item"><span class="color-chip" style="background-color: ${cssColor};"></span><code>${color}</code></div>`;
        }).join('');
    }

    function checkLines(text) {
        const lines = text.split('\n');
        let errors = [];
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (Array.from(line).length > 40) errors.push(`<span class="warning">L${i+1}: 40列超過</span>`);
            if (line.includes('　')) errors.push(`<span class="warning">L${i+1}: 全角スペース</span>`);

//            if (/[\?\:]|func\s|for\s/.test(line) && i + 1 < lines.length) {
//                const currentIndent = (line.match(/^ */) || [""])[0].length;
//                let nextIdx = i + 1;
//                while (nextIdx < lines.length) {
//                    if (lines[nextIdx].trim().length > 0 && !lines[nextIdx].trim().startsWith('//')) {
//                        const nextIndent = (lines[nextIdx].match(/^ */) || [""])[0].length;
//                        if (nextIndent <= currentIndent) errors.push(`<span class="warning">L${nextIdx + 1}: 字下げ不足</span>`);
//                        break;
//                    }
//                    nextIdx++;
//                }
//            }
            if (/[\?\:]|func\s|for\s/.test(line) && i + 1 < lines.length) {
                const currentIndent = (line.match(/^ */) || [""])[0].length;
                let nextIdx = i + 1;
                while (nextIdx < lines.length) {
                    const nextLineTrimmed = lines[nextIdx].trim(); // 前後の空白を消した文字列
                    
                    // 空行でなく、コメント行でなく、かつ「^」で始まっていない場合のみチェック対象にする
                    if (nextLineTrimmed.length > 0 && !nextLineTrimmed.startsWith('//') && !nextLineTrimmed.startsWith('^')) {
                        const nextIndent = (lines[nextIdx].match(/^ */) || [""])[0].length;
                        if (nextIndent <= currentIndent) errors.push(`<span class="warning">L${nextIdx + 1}: 字下げ不足</span>`);
                        break; // 有効な行をチェックしたのでループを抜ける
                    }
                    
                    // もし「^」で始まる行だった場合は、その行のチェックをスキップしてさらに次の行を探します
                    nextIdx++;
                }
            }
        }
        lineCounter.innerHTML = errors.length > 0 ? errors.join('') : `<span class="ok">✅ OK</span>`;
    }

    function handleInput() {
        updateColors(editor.value);
        checkLines(editor.value);
        updateCursorInfo();
        showSuggestions();
    }

    editor.addEventListener('input', handleInput);
    editor.addEventListener('click', handleInput);
    editor.addEventListener('keyup', (e) => {
        if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Backspace"].includes(e.key)) handleInput();
    });

    function togglePreview() {
        contentArea.style.display = (contentArea.style.display === 'none' || contentArea.style.display === '') ? 'block' : 'none';
    }

    async function loadList() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            const select = document.getElementById("fileList");
            
            // 1. まずファイルだけに絞り込みます
            const files = data.filter(f => f.type === "file");
            
            // 2. ファイル名（name）の昇順で並び替えます
            files.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
            
            // 3. 並び替えたデータをプルダウンに反映します
            select.innerHTML = files.map(f => `<option value="${f.path}">${f.name}</option>`).join('');
        } catch { 
            console.error("List error"); 
        }
    }

    async function loadFile() {
        const path = document.getElementById("fileList").value;
        const url = `https://raw.githubusercontent.com/ryuubokusub1/stone_story_rpg/main/${path}`;
        try {
            const res = await fetch(url);
            contentArea.value = await res.text();
            alert("データを読み込みました。\n表示切替ボタンを押下してください。");
        } catch { alert("取得失敗"); }
    }

    function OpenURL() {
        const path = document.getElementById("fileList").value;
        if(path) window.open(`https://github.com/ryuubokusub1/stone_story_rpg/edit/main/${path}`, '_blank');
    }

    loadList();
